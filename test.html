<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lembar Ujian Psikotes - HR Recruitment</title>

  <!-- CDNs for styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- App Header / Navbar -->
  <nav class="navbar main-navbar glass-effect sticky-top no-print">
    <div class="container">
      <span class="navbar-brand logo-text">
        <span class="logo-accent"><i class="bi bi-rocket-takeoff-fill"></i> HR</span> RECRUITMENT
      </span>

      <div class="d-flex align-items-center gap-3">
        <!-- Candidate Profile Badge -->
        <span class="badge bg-light text-dark border py-2 px-3 d-none d-sm-inline-block">
          <i class="bi bi-person-fill text-primary me-1"></i> <span id="navCandidateName">Peserta</span>
        </span>

        <!-- Theme Switcher Toggle -->
        <div class="theme-switch-wrapper">
          <label class="theme-switch" for="darkModeToggle">
            <input type="checkbox" id="darkModeToggle" />
            <div class="slider">
              <div class="slider-icons">
                <i class="bi bi-sun-fill"></i>
                <i class="bi bi-moon-stars-fill"></i>
              </div>
            </div>
          </label>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Test Layout -->
  <main class="container my-5 py-2">
    <div class="test-grid-container">

      <!-- Left Column: Current Question Display -->
      <div class="left-panel" data-aos="fade-right">
        <div class="card-modern glass-effect p-4 border-2"
          style="min-height: 480px; display: flex; flex-direction: column;">

          <!-- Question Header Status -->
          <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
            <div>
              <span class="badge bg-primary text-white font-12 px-2.5 py-1.5 rounded"
                id="questionCategory">KATEGORI</span>
            </div>
            <div class="text-secondary small fw-600">
              Soal <span id="currentQuestionNum">0</span> dari <span id="totalQuestionsNum">50</span>
            </div>
          </div>

          <!-- Question Body Text -->
          <div class="flex-grow-1">
            <h4 class="fw-600 mb-4" id="questionText" style="line-height: 1.5;">Memuat teks soal...</h4>

            <!-- Dynamic Options List -->
            <div class="option-container" id="optionsContainer">
              <!-- Rendered dynamically -->
            </div>
          </div>

          <!-- Navigation Action Bar -->
          <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-4">
            <button class="btn btn-secondary-modern px-3" id="btnPrev">
              <i class="bi bi-arrow-left-short font-16 me-1"></i> Sebelumnya
            </button>
            <button class="btn btn-primary-modern px-4" id="btnNext">
              Berikutnya <i class="bi bi-arrow-right-short font-16 ms-1"></i>
            </button>
          </div>

        </div>
      </div>

      <!-- Right Column: Timer & Grid Panel -->
      <div class="right-panel" data-aos="fade-left">
        <div class="timer-card card-modern glass-effect border-2 p-4">

          <!-- Timer Section -->
          <div class="mb-4 text-center">
            <span class="text-secondary small fw-bold d-block text-uppercase letter-spacing-1 mb-1">Sisa Waktu
              Anda</span>
            <div class="timer-countdown" id="timerDisplay">60:00</div>
            <div class="timer-progress-bar">
              <div class="timer-progress-fill" id="timerProgress" style="width: 100%;"></div>
            </div>
          </div>

          <hr class="my-4 text-muted">

          <!-- Question Grid Navigator -->
          <div class="mb-4">
            <span class="text-secondary small fw-bold d-block mb-3 text-uppercase">Navigasi Soal</span>
            <div class="question-nav-grid" id="navGridContainer">
              <!-- Rendered dynamically (50 buttons) -->
            </div>
          </div>

          <!-- Submit Button -->
          <div class="d-grid gap-2 border-top pt-3 mt-2">
            <button class="btn btn-success py-2.5 fw-bold font-14" id="btnSubmitTest">
              <i class="bi bi-check2-circle me-1"></i> Selesai & Kirim Ujian
            </button>
          </div>

        </div>
      </div>

    </div>
  </main>

  <!-- Script CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.all.min.js"></script>

  <!-- App JS modules -->
  <script src="js/storage.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/question.js"></script>
  <script src="js/score.js"></script>
  <script src="js/main.js"></script>

  <!-- Controller Logic -->
  <script>
    let candidate = null;
    let questions = [];
    let currentIndex = 0;
    let candidateAnswers = {};

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Route guard check
      const storedCandidate = sessionStorage.getItem('web_psikotes_current_candidate');
      if (!storedCandidate) {
        Swal.fire({
          icon: 'warning',
          title: 'Akses Ditolak',
          text: 'Harap isi biodata peserta terlebih dahulu!',
          confirmButtonText: 'Ke Biodata'
        }).then(() => {
          window.location.href = 'biodata.html';
        });
        return;
      }

      candidate = JSON.parse(storedCandidate);
      document.getElementById('navCandidateName').innerText = candidate.name;

      // 2. Load and randomize questions
      Loader.show();
      try {
        questions = await QuestionManager.loadQuestions();
        candidateAnswers = QuestionManager.getAnswers();
        Loader.hide();
      } catch (err) {
        Loader.hide();
        Swal.fire({
          icon: 'error',
          title: 'Error',
          text: 'Gagal memuat soal psikotes. Jalankan web di web server lokal (seperti http-server atau Live Server)!'
        });
        return;
      }

      // 3. Initialize UI elements
      document.getElementById('totalQuestionsNum').innerText = questions.length;
      renderNavigationGrid();
      displayQuestion(0);

      // 4. Start Countdown Timer (60 minutes)
      TimerManager.start(60,
        // Tick callback
        (formattedTime, percentage, timeRemaining) => {
          const display = document.getElementById('timerDisplay');
          const progress = document.getElementById('timerProgress');
          if (display) display.innerText = formattedTime;
          if (progress) progress.style.width = percentage + '%';

          // Visual warning when time is low (under 5 minutes)
          if (timeRemaining < 300) {
            display.classList.add('text-danger');
          }
        },
        // Timeout callback
        () => {
          Swal.fire({
            icon: 'warning',
            title: 'Waktu Habis!',
            text: 'Waktu ujian Anda telah habis. Jawaban akan dikirim secara otomatis.',
            allowOutsideClick: false,
            confirmButtonText: 'Kirim Jawaban'
          }).then(() => {
            submitTest(true); // Force submit
          });
        }
      );

      // 5. Setup Action events
      document.getElementById('btnPrev').addEventListener('click', () => {
        if (currentIndex > 0) displayQuestion(currentIndex - 1);
      });

      document.getElementById('btnNext').addEventListener('click', () => {
        if (currentIndex < questions.length - 1) displayQuestion(currentIndex + 1);
      });

      document.getElementById('btnSubmitTest').addEventListener('click', () => {
        const totalAnswered = Object.keys(candidateAnswers).length;
        const totalQuestions = questions.length;
        const unansweredCount = totalQuestions - totalAnswered;

        let promptText = "Apakah Anda yakin ingin menyelesaikan tes dan mengirim semua jawaban?";
        if (unansweredCount > 0) {
          promptText = `Terdapat ${unansweredCount} soal yang belum Anda jawab. Anda masih memiliki sisa waktu. Apakah Anda yakin ingin menyelesaikan tes?`;
        }

        Swal.fire({
          title: 'Kirim Jawaban Psikotes?',
          text: promptText,
          icon: unansweredCount > 0 ? 'warning' : 'question',
          showCancelButton: true,
          confirmButtonColor: '#10B981',
          cancelButtonColor: '#6B7280',
          confirmButtonText: 'Ya, Selesai & Kirim!',
          cancelButtonText: 'Periksa Kembali'
        }).then((result) => {
          if (result.isConfirmed) {
            submitTest(false);
          }
        });
      });
    });

    /**
     * Renders a question to the page
     */
    function displayQuestion(index) {
      if (index < 0 || index >= questions.length) return;
      currentIndex = index;

      const question = questions[index];

      // Update Category & Progress
      const catBadge = document.getElementById('questionCategory');
      catBadge.innerText = formatCategoryName(question.category);
      document.getElementById('currentQuestionNum').innerText = index + 1;

      // Update question text
      document.getElementById('questionText').innerText = question.question;

      // Render options list
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';

      question.options.forEach((opt, optIdx) => {
        const isSelected = candidateAnswers[question.id] === optIdx;
        const letter = String.fromCharCode(65 + optIdx); // A, B, C, D, E...

        const card = document.createElement('div');
        card.className = `option-card ${isSelected ? 'selected' : ''}`;
        card.innerHTML = `
          <div class="option-badge">${letter}</div>
          <div class="option-text font-14">${opt.text}</div>
        `;

        card.addEventListener('click', () => {
          selectOption(question.id, optIdx);
        });

        container.appendChild(card);
      });

      // Update Navigation button disabled states
      document.getElementById('btnPrev').disabled = index === 0;
      // Change "Next" to "Selesai" if on last question
      const btnNext = document.getElementById('btnNext');
      if (index === questions.length - 1) {
        btnNext.innerHTML = 'Selesai <i class="bi bi-check-lg ms-1"></i>';
        btnNext.className = 'btn btn-success px-4';
      } else {
        btnNext.innerHTML = 'Berikutnya <i class="bi bi-arrow-right-short font-16 ms-1"></i>';
        btnNext.className = 'btn btn-primary-modern px-4';
      }

      // Highlight active grid button
      document.querySelectorAll('.question-nav-btn').forEach((btn, bIdx) => {
        if (bIdx === index) btn.classList.add('current');
        else btn.classList.remove('current');
      });
    }

    /**
     * Handles candidate selecting an option
     */
    function selectOption(questionId, optionIndex) {
      // Save answer in memory and sessionStorage
      candidateAnswers[questionId] = optionIndex;
      QuestionManager.saveAnswer(questionId, optionIndex);

      // Re-render choices card selection styles
      const optionCards = document.querySelectorAll('.option-card');
      optionCards.forEach((card, idx) => {
        if (idx === optionIndex) {
          card.classList.add('selected');
        } else {
          card.classList.remove('selected');
        }
      });

      // Update corresponding navigation button in grid
      const gridBtn = document.getElementById(`nav-btn-${currentIndex}`);
      if (gridBtn) gridBtn.classList.add('answered');

      // Automatically jump to the next question after a tiny delay for smooth flows
      if (currentIndex < questions.length - 1) {
        setTimeout(() => {
          displayQuestion(currentIndex + 1);
        }, 300);
      }
    }

    /**
     * Renders 50 question navigation buttons
     */
    function renderNavigationGrid() {
      const container = document.getElementById('navGridContainer');
      container.innerHTML = '';

      questions.forEach((q, idx) => {
        const isAnswered = candidateAnswers[q.id] !== undefined;

        const btn = document.createElement('button');
        btn.id = `nav-btn-${idx}`;
        btn.className = `question-nav-btn ${isAnswered ? 'answered' : ''}`;
        btn.innerText = idx + 1;
        btn.addEventListener('click', () => displayQuestion(idx));

        container.appendChild(btn);
      });
    }

    /**
     * Submits the candidate's test, calculates metrics, saves details, and redirects
     */
    function submitTest(isForceTimeout = false) {
      TimerManager.clear();
      Loader.show();

      // Recalculate candidate evaluation
      const evaluation = ScoreManager.calculate(candidateAnswers, questions);

      // Save participant details to local storage
      StorageManager.saveParticipant(candidate);

      // Save evaluation scores
      const resultRecord = {
        participantId: candidate.id,
        scores: evaluation.scores,
        totalScore: evaluation.totalScore,
        category: evaluation.category,
        answers: candidateAnswers
      };
      StorageManager.saveResult(resultRecord);

      // Clean up session testing states
      QuestionManager.clearSessionState();

      // Short delay for database write simulation
      setTimeout(() => {
        Loader.hide();
        window.location.href = 'submit.html';
      }, 1000);
    }

    /**
     * Converts raw categories name into readable Indonesian titles
     */
    function formatCategoryName(cat) {
      switch (cat) {
        case 'kepribadian': return 'Kepribadian';
        case 'logika': return 'Logika';
        case 'copywriting': return 'Copywriting';
        case 'kreativitas': return 'Kreativitas';
        case 'analisa_data': return 'Analisa Data';
        default: return 'Ujian';
      }
    }
  </script>
</body>

</html>
