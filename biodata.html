<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isi Biodata Peserta - HR Psikotes</title>

  <!-- CDNs for styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- App Header / Navbar -->
  <nav class="navbar main-navbar glass-effect sticky-top">
    <div class="container">
      <a class="navbar-brand logo-text" href="index.html">
        <span class="logo-accent"><i class="bi bi-rocket-takeoff-fill"></i> HR</span> RECRUITMENT
      </a>

      <!-- Theme Switcher Toggle -->
      <div class="theme-switch-wrapper">
        <label class="theme-switch" for="darkModeToggle">
          <input type="checkbox" id="darkModeToggle" />
          <div class="slider">
            <div class="slider-icons">
              <i class="bi bi-sun-fill"></i>
              <i class="bi bi-moon-stars-fill"></i>
            </div>
          </div>
        </label>
      </div>
    </div>
  </nav>

  <!-- Main Registration Form Container -->
  <main class="container my-auto py-5 d-flex align-items-center justify-content-center">
    <div class="col-lg-6 col-md-8" data-aos="zoom-in" data-aos-duration="600">
      <div class="card-modern glass-effect p-4 p-md-5 border-2">
        <div class="text-center mb-4">
          <h2 class="fw-700">Biodata Peserta</h2>
          <p class="text-secondary small">Lengkapi identitas diri Anda sebelum memulai ujian psikotes</p>
        </div>

        <form id="biodataForm" class="needs-validation" novalidate>

          <!-- Nama Lengkap -->
          <div class="mb-3">
            <label for="namaLengkap" class="form-label fw-600">Nama Lengkap <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control border-start-0 ps-0" id="namaLengkap" required
                placeholder="Masukkan nama lengkap sesuai KTP">
              <div class="invalid-feedback">Nama lengkap wajib diisi.</div>
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="emailAddress" class="form-label fw-600">Alamat Email <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control border-start-0 ps-0" id="emailAddress" required
                placeholder="name@example.com">
              <div class="invalid-feedback">Masukkan alamat email yang valid.</div>
            </div>
          </div>

          <!-- No HP -->
          <div class="mb-3">
            <label for="noHP" class="form-label fw-600">No. WhatsApp / HP <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-telephone"></i></span>
              <input type="tel" class="form-control border-start-0 ps-0" id="noHP" required placeholder="08xxxxxxxxxx"
                pattern="[0-9]{9,15}">
              <div class="invalid-feedback">Masukkan nomor HP/WhatsApp yang valid (9-15 digit angka).</div>
            </div>
          </div>

          <!-- Posisi Dilamar -->
          <div class="mb-3">
            <label for="posisiDilamar" class="form-label fw-600">Posisi Dilamar <span
                class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-briefcase"></i></span>
              <select class="form-select border-start-0 ps-0" id="posisiDilamar" required>
                <option value="" disabled selected>Pilih posisi...</option>
                <option value="Social Media Specialist">Social Media Specialist</option>
                <option value="Copywriter">Copywriter</option>
                <option value="Content Writer">Content Writer</option>
                <option value="Data Analyst">Data Analyst</option>
                <option value="Digital Marketer">Digital Marketer</option>
              </select>
              <div class="invalid-feedback">Pilih posisi yang ingin dilamar.</div>
            </div>
          </div>

          <!-- Row for Pendidikan & Domisili -->
          <div class="row g-3 mb-4">
            <!-- Pendidikan -->
            <div class="col-sm-6">
              <label for="pendidikan" class="form-label fw-600">Pendidikan Terakhir</label>
              <input type="text" class="form-control" id="pendidikan" placeholder="Contoh: S1 Ilmu Komunikasi">
            </div>

            <!-- Domisili -->
            <div class="col-sm-6">
              <label for="domisili" class="form-label fw-600">Domisili Kota</label>
              <input type="text" class="form-control" id="domisili" placeholder="Contoh: Jakarta">
            </div>
          </div>

          <!-- Submit Button -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary-modern py-3">
              Mulai Ujian Psikotes <i class="bi bi-play-fill ms-1"></i>
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>

  <!-- Global Footer -->
  <footer class="mt-auto py-4 border-top bg-white text-center text-secondary small">
    <div class="container">
      <p class="mb-0">&copy; 2026 HR Talent Assessments. Hak Cipta Dilindungi.</p>
    </div>
  </footer>

  <!-- Script CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.all.min.js"></script>

  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>

  <!-- Page Specific Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('biodataForm');

      // Auto-clear active session test state in case of returning candidate
      sessionStorage.removeItem('web_psikotes_current_candidate');
      sessionStorage.removeItem('web_psikotes_shuffled_questions');
      sessionStorage.removeItem('web_psikotes_candidate_answers');
      sessionStorage.removeItem('web_psikotes_timer_end');

      form.addEventListener('submit', (event) => {
        event.preventDefault();

        if (!form.checkValidity()) {
          event.stopPropagation();
          form.classList.add('was-validated');
          return;
        }

        // Gather data
        const candidateData = {
          id: 'PSKT-' + new Date().toISOString().slice(0, 10).replace(/-/g, '') + '-' + Math.floor(100 + Math.random() * 900),
          name: document.getElementById('namaLengkap').value.trim(),
          email: document.getElementById('emailAddress').value.trim(),
          phone: document.getElementById('noHP').value.trim(),
          position: document.getElementById('posisiDilamar').value,
          education: document.getElementById('pendidikan').value.trim(),
          domicile: document.getElementById('domisili').value.trim(),
          testDate: new Date().toISOString()
        };

        // Save in sessionStorage
        sessionStorage.setItem('web_psikotes_current_candidate', JSON.stringify(candidateData));

        // Show confirmation loading
        Swal.fire({
          title: 'Mempersiapkan Soal...',
          text: 'Anda akan dialihkan ke halaman ujian.',
          icon: 'success',
          timer: 1500,
          showConfirmButton: false,
          willClose: () => {
            window.location.href = 'test.html';
          }
        });
      });
    });
  </script>
</body>

</html>
