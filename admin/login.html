<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Portal Recruitment</title>

  <!-- CDNs for styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- App Header / Navbar -->
  <nav class="navbar main-navbar glass-effect sticky-top">
    <div class="container">
      <a class="navbar-brand logo-text" href="../index.html">
        <span class="logo-accent"><i class="bi bi-rocket-takeoff-fill"></i> HR</span> RECRUITMENT
      </a>

      <!-- Theme Switcher Toggle -->
      <div class="theme-switch-wrapper">
        <label class="theme-switch" for="darkModeToggle">
          <input type="checkbox" id="darkModeToggle" />
          <div class="slider">
            <div class="slider-icons">
              <i class="bi bi-sun-fill"></i>
              <i class="bi bi-moon-stars-fill"></i>
            </div>
          </div>
        </label>
      </div>
    </div>
  </nav>

  <!-- Login Form Container -->
  <main class="container my-auto py-5 d-flex align-items-center justify-content-center">
    <div class="col-lg-5 col-md-7" data-aos="zoom-in" data-aos-duration="600">
      <div class="card-modern glass-effect p-4 p-md-5 border-2">
        <div class="text-center mb-4">
          <div class="text-primary fs-1 mb-2"><i class="bi bi-person-badge-fill"></i></div>
          <h2 class="fw-700">HR Admin Login</h2>
          <p class="text-secondary small">Masuk untuk mengelola data peserta dan melihat hasil psikotes</p>
        </div>

        <form id="loginForm" class="needs-validation" novalidate>

          <!-- Username -->
          <div class="mb-3">
            <label for="usernameInput" class="form-label fw-600">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person-fill"></i></span>
              <input type="text" class="form-control border-start-0 ps-0" id="usernameInput" required
                placeholder="admin">
              <div class="invalid-feedback">Username wajib diisi.</div>
            </div>
          </div>

          <!-- Password -->
          <div class="mb-4">
            <label for="passwordInput" class="form-label fw-600">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control border-start-0 ps-0" id="passwordInput" required
                placeholder="••••••••">
              <div class="invalid-feedback">Password wajib diisi.</div>
            </div>
          </div>

          <!-- Submit Button -->
          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary-modern py-3">
              Masuk Dashboard <i class="bi bi-box-arrow-in-right ms-1"></i>
            </button>
          </div>

          <div class="text-center">
            <a href="../index.html" class="text-secondary small"><i class="bi bi-chevron-left"></i> Kembali ke Beranda
              Ujian</a>
          </div>

        </form>
      </div>
    </div>
  </main>

  <!-- Global Footer -->
  <footer class="mt-auto py-4 border-top bg-white text-center text-secondary small">
    <div class="container">
      <p class="mb-0">&copy; 2026 HR Talent Assessments. Hak Cipta Dilindungi.</p>
    </div>
  </footer>

  <!-- Script CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.all.min.js"></script>

  <script src="../js/auth.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/main.js"></script>

  <!-- Page Specific Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        if (!form.checkValidity()) {
          form.classList.add('was-validated');
          return;
        }

        const username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value;

        // Run AuthManager login logic
        const success = AuthManager.login(username, password);

        if (success) {
          Toast.success('Login berhasil! Mengalihkan...');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } else {
          Swal.fire({
            icon: 'error',
            title: 'Login Gagal',
            text: 'Username atau Password salah!',
            confirmButtonColor: '#EF4444'
          });
        }
      });
    });
  </script>
</body>

</html>
